<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曾慶越 Chingyueh Tseng | 視覺藝術與科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div class="max-w-3xl mx-auto py-20 px-8">
        <header class="mb-16">
            <h1 class="text-5xl font-extrabold tracking-tight mb-4 text-slate-900">曾慶越</h1>
            <p class="text-2xl text-blue-600 font-medium">Associate Professor @ Visual Arts</p>
            <p class="mt-4 text-slate-500 text-lg">主持人：The Portal / 1.76 實驗室</p>
        </header>

        <section class="space-y-12">
            <div class="p-8 bg-white rounded-2xl shadow-sm border border-slate-100">
                <h2 class="text-xl font-bold mb-4 text-slate-800">關於我</h2>
                <p class="text-slate-600 leading-relaxed text-lg">
                    深耕於科技藝術領域，擅長使用 TouchDesigner 進行影像創作與教學。
                    目前研究重心在於虛實整合、互動影像設計以及藝術資訊的視覺化呈現。
                </p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="p-6 border-2 border-dashed border-slate-200 rounded-2xl text-center">
                    <p class="text-slate-400">未來作品集展示區</p>
                </div>
                <div class="p-6 border-2 border-dashed border-slate-200 rounded-2xl text-center">
                    <p class="text-slate-400">實驗室研究專案</p>
                </div>
            </div>
        </section>

        <footer class="mt-20 pt-8 border-t border-slate-200 text-slate-400 text-sm">
            © 2026 Chingyueh Tseng. Powered by Vercel.
        </footer>
    </div>
</body>
</html>
